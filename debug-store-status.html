<!DOCTYPE html>
<html>
<head>
  <title>Debug Store Status</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Store Status Debug</h1>
  <pre id="output">Loading...</pre>

  <script>
    const supabase = window.supabase.createClient(
      'https://kmmxfqqpoipeqdcvtljv.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttbXhmcXFwb2lwZXFkY3Z0bGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTYzNTMsImV4cCI6MjA5MzI5MjM1M30.IRjJkMSiGPkW7BPDUZqx4L_Fn6tWZpOnTJoj5ijWwx4'
    );

    async function debug() {
      const { data, error } = await supabase
        .from('store_settings')
        .select('key, value');

      if (error) {
        document.getElementById('output').textContent = 'Error: ' + JSON.stringify(error, null, 2);
        return;
      }

      const settings = {};
      data.forEach(row => { settings[row.key] = row.value; });

      // Calculate WIB time
      const now = new Date();
      const wibOffset = 7 * 60;
      const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
      const wibMinutes = (utcMinutes + wibOffset) % (24 * 60);
      const wibHours = Math.floor(wibMinutes / 60);
      const wibMins = wibMinutes % 60;

      const openHour = settings.open_hour || '07:00';
      const closeHour = settings.close_hour || '22:00';
      const [openH, openM] = openHour.split(':').map(Number);
      const [closeH, closeM] = closeHour.split(':').map(Number);
      const openMin = openH * 60 + openM;
      const closeMin = closeH * 60 + closeM;

      const isOpenByHours = wibMinutes >= openMin && wibMinutes < closeMin;

      const output = {
        'Raw Settings': data,
        'Parsed Settings': settings,
        'is_open value': settings.is_open,
        'is_open type': typeof settings.is_open,
        'Current WIB Time': `${wibHours.toString().padStart(2, '0')}:${wibMins.toString().padStart(2, '0')}`,
        'Open Hour': openHour,
        'Close Hour': closeHour,
        'WIB Minutes': wibMinutes,
        'Open Minutes': openMin,
        'Close Minutes': closeMin,
        'Is Open By Hours': isOpenByHours,
        'Manual Override': settings.is_open === false || settings.is_open === 'false' ? 'CLOSED' : 
                          settings.is_open === true || settings.is_open === 'true' ? 'OPEN' : 'NONE',
      };

      document.getElementById('output').textContent = JSON.stringify(output, null, 2);
    }

    debug();
  </script>
</body>
</html>
